<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Location</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8FAFC;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 32px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .date {
      font-size: 13px;
      color: #94A3B8;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1E293B;
      margin-bottom: 28px;
      line-height: 1.3;
    }

    .buttons {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 14px 12px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease, opacity 0.1s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      line-height: 1;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .btn:active {
      transform: translateY(0);
      opacity: 0.9;
    }

    .btn span.emoji {
      font-size: 28px;
    }

    .btn-home {
      background: #DCFCE7;
      color: #15803D;
    }

    .btn-home:hover {
      background: #BBF7D0;
    }

    .btn-office {
      background: #DBEAFE;
      color: #1D4ED8;
    }

    .btn-office:hover {
      background: #BFDBFE;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="date" id="date"></div>
    <h1>Where are you working today?</h1>
    <div class="buttons">
      <button id="home-btn" class="btn btn-home">
        <span class="emoji">🏠</span>
        Home
      </button>
      <button id="office-btn" class="btn btn-office">
        <span class="emoji">🏢</span>
        Office
      </button>
    </div>
  </div>
  <script src="prompt.js"></script>
</body>
</html>
